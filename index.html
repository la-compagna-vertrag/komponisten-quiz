<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komponisten Quiz - Wie gut kennst du die Klassik?</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 720px;
      margin: 40px auto;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; margin-bottom: 10px; }
    .subtitle { text-align: center; opacity: 0.9; margin-bottom: 30px; }
    
    .composer-image {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.3);
      display: block;
      margin: 15px auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }

    .question {
      font-size: 1.3rem;
      margin: 20px 0;
      text-align: center;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    button {
      padding: 15px;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: white;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: rgba(255,255,255,0.3);
      transform: translateX(10px);
    }
    button.correct { background: #4ade80; }
    button.wrong { background: #f87171; }

    .progress {
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
      margin: 20px 0;
    }
    .progress-bar {
      height: 100%;
      background: #60a5fa;
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s;
    }

    .result { text-align: center; font-size: 1.4rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎼 Komponisten Quiz</h1>
    <p class="subtitle">Wie gut kennst du die großen Meister der Klassik?</p>

    <div id="startScreen">
      <button onclick="startQuiz()" style="font-size:1.4rem; padding:20px 40px; width:100%; background:#3b82f6;">
        Quiz starten (10 Fragen)
      </button>
    </div>

    <div id="quizScreen" class="hidden">
      <div class="progress"><div class="progress-bar" id="progress"></div></div>
      <p><strong>Frage <span id="currentQuestion">1</span>/10</strong></p>
      
      <img id="composerImage" class="composer-image" src="" alt="Komponist">
      
      <div class="question" id="questionText"></div>
      <div class="options" id="options"></div>
      
      <button onclick="nextQuestion()" id="nextBtn" class="hidden" style="margin-top:20px;">Nächste Frage →</button>
    </div>

    <div id="resultScreen" class="hidden">
      <h2>Dein Ergebnis</h2>
      <div class="result" id="scoreText"></div>
      <p id="comment" style="font-size:1.3rem; margin:25px 0;"></p>
      
      <button onclick="restartQuiz()" style="padding:15px 30px; font-size:1.1rem;">
        Quiz neu starten
      </button>
    </div>
  </div>

  <script>
    const questions = [
      { question: "Wer komponierte die 'Mondscheinsonate'?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Beethoven.jpg/800px-Beethoven.jpg", options: ["Wolfgang Amadeus Mozart", "Ludwig van Beethoven", "Johann Sebastian Bach", "Frédéric Chopin"], correct: 1 },
      { question: "Welcher Komponist wurde taub und komponierte trotzdem weiter?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Beethoven.jpg/800px-Beethoven.jpg", options: ["Ludwig van Beethoven", "Johannes Brahms", "Franz Schubert", "Antonio Vivaldi"], correct: 0 },
      { question: "Welches Werk stammt von Antonio Vivaldi?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Antonio_Vivaldi.jpg/800px-Antonio_Vivaldi.jpg", options: ["Die Zauberflöte", "Die vier Jahreszeiten", "Eine kleine Nachtmusik", "Die Unvollendete"], correct: 1 },
      { question: "In welcher Stadt wurde Wolfgang Amadeus Mozart geboren?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Wolfgang-amadeus-mozart_1.jpg/800px-Wolfgang-amadeus-mozart_1.jpg", options: ["Wien", "Berlin", "Salzburg", "Paris"], correct: 2 },
      { question: "Welcher Komponist ist bekannt für seine Polonaisen und Walzer?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Frederic_Chopin_photo.jpeg/800px-Frederic_Chopin_photo.jpeg", options: ["Claude Debussy", "Frédéric Chopin", "Pyotr Tschaikowski", "George Gershwin"], correct: 1 },
      { question: "Wer komponierte 'Also sprach Zarathustra'?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Richard_Strauss.jpg/800px-Richard_Strauss.jpg", options: ["Richard Strauss", "Richard Wagner", "Gustav Mahler", "Hector Berlioz"], correct: 0 },
      { question: "Wie viele Sinfonien schrieb Ludwig van Beethoven?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Beethoven.jpg/800px-Beethoven.jpg", options: ["5", "7", "9", "11"], correct: 2 },
      { question: "Welcher Komponist gilt als 'Vater der Sinfonie'?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Joseph_Haydn.jpg/800px-Joseph_Haydn.jpg", options: ["Joseph Haydn", "Johann Sebastian Bach", "Georg Friedrich Händel", "Felix Mendelssohn"], correct: 0 },
      { question: "Welches Instrument spielte Franz Liszt virtuos?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Franz_Liszt.jpg/800px-Franz_Liszt.jpg", options: ["Geige", "Klavier", "Cello", "Flöte"], correct: 1 },
      { question: "Wer komponierte den Hochzeitsmarsch aus 'Ein Sommernachtstraum'?", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Wolfgang-amadeus-mozart_1.jpg/800px-Wolfgang-amadeus-mozart_1.jpg", options: ["Robert Schumann", "Felix Mendelssohn Bartholdy", "Hector Berlioz", "Camille Saint-Saëns"], correct: 1 }
    ];

    let currentQuestion = 0;
    let score = 0;

    function startQuiz() {
      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('quizScreen').classList.remove('hidden');
      currentQuestion = 0;
      score = 0;
      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionText').textContent = q.question;
      document.getElementById('currentQuestion').textContent = currentQuestion + 1;
      document.getElementById('composerImage').src = q.image;

      const progress = ((currentQuestion) / questions.length) * 100;
      document.getElementById('progress').style.width = progress + '%';

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.textContent = option;
        btn.onclick = () => selectAnswer(index, btn);
        optionsDiv.appendChild(btn);
      });

      document.getElementById('nextBtn').classList.add('hidden');
    }

    function selectAnswer(index, button) {
      const correctIndex = questions[currentQuestion].correct;
      const buttons = document.querySelectorAll('.options button');
      buttons.forEach(btn => btn.disabled = true);
      
      if (index === correctIndex) {
        button.classList.add('correct');
        score++;
      } else {
        button.classList.add('wrong');
        buttons[correctIndex].classList.add('correct');
      }
      document.getElementById('nextBtn').classList.remove('hidden');
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('quizScreen').classList.add('hidden');
      document.getElementById('resultScreen').classList.remove('hidden');

      const percentage = Math.round((score / questions.length) * 100);
      let comment = percentage >= 90 ? "🎉 Du bist ein echter Klassik-Experte!" :
                    percentage >= 70 ? "Sehr gut! Du kennst dich richtig aus." :
                    percentage >= 50 ? "Nicht schlecht! Etwas Übung würde helfen." :
                    "Du hast noch Potenzial! Mehr Klassik hören empfohlen 😊";

      document.getElementById('scoreText').innerHTML = `Du hast <strong>${score}/${questions.length}</strong> richtig! (${percentage}%)`;
      document.getElementById('comment').textContent = comment;
    }

    function restartQuiz() {
      document.getElementById('resultScreen').classList.add('hidden');
      document.getElementById('startScreen').classList.remove('hidden');
    }
  </script>
</body>
</html>
