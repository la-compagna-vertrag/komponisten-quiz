<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komponisten Quiz</title>

  <style>
    :root {
      --bg1: #102a5c;
      --bg2: #2857a3;
      --card: rgba(255,255,255,0.12);
      --card-strong: rgba(255,255,255,0.18);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --blue: #60a5fa;
      --blue-strong: #3b82f6;
      --green: #4ade80;
      --red: #f87171;
      --gold: #facc15;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      margin: 0;
      padding: 24px;
      min-height: 100vh;
    }

    .app {
      max-width: 840px;
      margin: 30px auto;
      background: var(--card);
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      margin: 0 0 10px;
    }

    h2 {
      text-align: center;
      margin-top: 0;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      color: white;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .center {
      text-align: center;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 24px;
    }

    .level-card {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .level-card:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-3px);
      box-shadow: 0 12px 26px rgba(0,0,0,0.22);
    }

    .level-card.locked {
      opacity: 0.48;
      cursor: default;
    }

    .level-card.locked:hover {
      transform: none;
      box-shadow: none;
      background: rgba(255,255,255,0.10);
    }

    .level-card h3 {
      margin: 8px 0 8px;
      font-size: 1.25rem;
    }

    .level-card p {
      color: var(--muted);
      line-height: 1.4;
      margin: 0;
    }

    .best-score {
      margin-top: 14px;
      font-size: 0.95rem;
      color: var(--gold);
      font-weight: 700;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .progress {
      height: 11px;
      background: rgba(255,255,255,0.28);
      border-radius: 999px;
      overflow: hidden;
      margin: 16px 0 20px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--gold));
      border-radius: 999px;
      width: 0%;
      transition: width 0.35s ease;
    }

    .composer-image {
      width: 100%;
      max-width: 430px;
      height: 360px;
      object-fit: contain;
      border-radius: 20px;
      border: 6px solid rgba(255,255,255,0.42);
      display: block;
      margin: 20px auto 18px;
      box-shadow: 0 14px 32px rgba(0,0,0,0.45);
      background: rgba(0,0,0,0.25);
      padding: 8px;
    }

    .image-error {
      text-align: center;
      color: #fecaca;
      font-size: 0.95rem;
      margin-bottom: 14px;
    }

    .question {
      font-size: 1.45rem;
      margin: 26px 0 22px;
      text-align: center;
      line-height: 1.35;
      font-weight: 650;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 16px 18px;
      font-size: 1.08rem;
      border: none;
      border-radius: 15px;
      background: rgba(255,255,255,0.22);
      color: white;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover:not(:disabled) {
      background: rgba(255,255,255,0.34);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    }

    button:disabled {
      cursor: default;
    }

    .primary-btn {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      font-weight: 700;
      font-size: 1.2rem;
      margin-top: 16px;
    }

    .secondary-btn {
      width: 100%;
      background: rgba(255,255,255,0.16);
      margin-top: 12px;
    }

    button.correct {
      background: var(--green) !important;
      color: #052e16;
      font-weight: 700;
    }

    button.wrong {
      background: var(--red) !important;
      color: #450a0a;
      font-weight: 700;
    }

    .feedback {
      text-align: center;
      margin: 18px 0 4px;
      min-height: 28px;
      font-size: 1.1rem;
      font-weight: 650;
    }

    .result-box {
      background: rgba(255,255,255,0.10);
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      margin: 22px 0;
    }

    .score-big {
      font-size: 3rem;
      font-weight: 800;
      margin: 10px 0;
      color: var(--gold);
    }

    .result-comment {
      font-size: 1.25rem;
      line-height: 1.45;
      color: var(--muted);
    }

    .version {
      text-align: center;
      opacity: 0.45;
      font-size: 0.8rem;
      margin-top: 24px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .app {
        margin: 10px auto;
        padding: 22px;
        border-radius: 22px;
      }

      h1 {
        font-size: 2rem;
      }

      .level-grid {
        grid-template-columns: 1fr;
      }

      .composer-image {
        height: 300px;
        max-width: 100%;
      }

      .question {
        font-size: 1.25rem;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>🎼 Komponisten Quiz</h1>
    <p class="subtitle">Musikgeschichte, Werkkunde und ein bisschen Klassik-Nerd-Freude.</p>

    <section id="levelScreen">
      <div class="center">
        <span class="badge">Wissens-Challenge</span>
        <h2>Wähle dein Level</h2>
      </div>

      <div class="level-grid" id="levelGrid"></div>

      <p class="version">Version 3.0 – Level-System</p>
    </section>

    <section id="quizScreen" class="hidden">
      <div class="top-row">
        <span class="badge" id="levelBadge">Level</span>
        <strong>Frage <span id="currentQuestion">1</span>/<span id="totalQuestions">10</span></strong>
      </div>

      <h2 id="levelTitle"></h2>

      <div class="progress">
        <div class="progress-bar" id="progress"></div>
      </div>

      <img id="composerImage" class="composer-image" src="" alt="Komponist">
      <div id="imageError" class="image-error hidden"></div>

      <div class="question" id="questionText"></div>
      <div class="options" id="options"></div>

      <div class="feedback" id="feedback"></div>

      <button onclick="nextQuestion()" id="nextBtn" class="primary-btn hidden">
        Nächste Frage →
      </button>

      <button onclick="backToLevels()" class="secondary-btn">
        Zur Level-Auswahl
      </button>
    </section>

    <section id="resultScreen" class="hidden">
      <div class="center">
        <span class="badge" id="resultLevelBadge">Level abgeschlossen</span>
        <h2 id="resultTitle">Dein Ergebnis</h2>
      </div>

      <div class="result-box">
        <div class="score-big" id="scoreText"></div>
        <p class="result-comment" id="comment"></p>
      </div>

      <button onclick="restartCurrentLevel()" class="primary-btn">Dieses Level nochmals spielen</button>
      <button onclick="backToLevels()" class="secondary-btn">Zurück zur Level-Auswahl</button>
    </section>
  </main>

  <script>
    const levels = [
      {

            correct: 1
          },
          {

          {

          },
          {

          {

          {

            image: "mendelssohn.jpg",
            options: ["Schumann", "Mendelssohn", "Berlioz", "Saint-Saëns"],
            correct: 1
          }
        ]
      },
      {
        id: 2,
        title: "Werke & Komponisten",
        description: "Jetzt wird es etwas mehr Werkkunde: Wer schrieb welches berühmte Werk?",
        active: true,
        questions: [
          {
            question: "Wer komponierte die 'Matthäus-Passion'?",
            image: "bach.jpg",
            options: ["Johann Sebastian Bach", "Georg Friedrich Händel", "Heinrich Schütz", "Antonio Vivaldi"],
            correct: 0
          },
          {
            question: "Wer komponierte die Oper 'La Traviata'?",
            image: "verdi.jpg",
            options: ["Puccini", "Rossini", "Verdi", "Bizet"],
            correct: 2
          },
          {
            question: "Welcher Komponist schrieb 'Die Moldau'?",
            image: "smetana.jpg",
            options: ["Dvořák", "Smetana", "Grieg", "Sibelius"],
            correct: 1
          },
          {
            question: "Von wem stammt der berühmte 'Boléro'?",
            image: "ravel.jpg",
            options: ["Debussy", "Ravel", "Fauré", "Bizet"],
            correct: 1
          },
          {
            question: "Wer komponierte 'Carmina Burana'?",
            image: "orff.jpg",
            options: ["Carl Orff", "Benjamin Britten", "Igor Strawinsky", "Paul Hindemith"],
            correct: 0
          },
          {
            question: "Wer komponierte das Musical 'West Side Story'?",
            image: "bernstein.jpg",
            options: ["Leonard Bernstein", "George Gershwin", "Aaron Copland", "Kurt Weill"],
            correct: 0
          },
          {
            question: "Wer schrieb 'Ein deutsches Requiem'?",
            image: "brahms.jpg",
            options: ["Brahms", "Bruckner", "Mahler", "Schumann"],
            correct: 0
          },
          {
            question: "Wer komponierte 'Le Sacre du printemps'?",
            image: "stravinsky.jpg",
            options: ["Ravel", "Strawinsky", "Prokofjew", "Schostakowitsch"],
            correct: 1
          },
          {
            question: "Wer komponierte den Opernzyklus 'Der Ring des Nibelungen'?",
            image: "wagner.jpg",
            options: ["Richard Wagner", "Richard Strauss", "Giuseppe Verdi", "Giacomo Puccini"],
            correct: 0
          },
          {
            question: "Zu welchem Komponisten gehört die Schauspielmusik 'Peer Gynt'?",
            image: "grieg.jpg",
            options: ["Sibelius", "Grieg", "Dvořák", "Elgar"],
            correct: 1
          }
        ]
      },
        {
  id: 3,
  title: "Epochen & Stil",
  description: "Barock, Klassik, Romantik, Moderne: erkennst du die Zusammenhänge?",
  active: true,
  questions: [
    {
      question: "Johann Sebastian Bach gehört hauptsächlich zu welcher Epoche?",
      image: "bach.jpg",
      options: ["Renaissance", "Barock", "Klassik", "Romantik"],
      correct: 1
    },
    {
      question: "Wolfgang Amadeus Mozart ist ein zentraler Komponist welcher Epoche?",
      image: "mozart.jpg",
      options: ["Barock", "Wiener Klassik", "Impressionismus", "Moderne"],
      correct: 1
    },
    {
      question: "Frédéric Chopin wird vor allem welcher Epoche zugeordnet?",
      image: "chopin.jpg",
      options: ["Renaissance", "Barock", "Romantik", "Avantgarde"],
      correct: 2
    },
    {
      question: "Claude Debussy wird besonders mit welcher Stilrichtung verbunden?",
      image: "debussy.jpg",
      options: ["Impressionismus", "Wiener Klassik", "Renaissance", "Minimal Music"],
      correct: 0
    },
    {
      question: "Arnold Schönberg ist eng verbunden mit welcher musikalischen Entwicklung?",
      image: "schoenberg.jpg",
      options: ["Generalbass", "Sonatenhauptsatzform", "Zwölftontechnik", "Gregorianik"],
      correct: 2
    },
    {
      question: "Giovanni Pierluigi da Palestrina steht besonders für welche Epoche?",
      image: "palestrina.jpg",
      options: ["Renaissance", "Romantik", "Expressionismus", "Klassik"],
      correct: 0
    },
    {
      question: "Claudio Monteverdi steht musikgeschichtlich besonders an der Schwelle zwischen ...",
      image: "monteverdi.jpg",
      options: ["Mittelalter und Renaissance", "Renaissance und Barock", "Klassik und Romantik", "Romantik und Moderne"],
      correct: 1
    },
    {
      question: "Igor Strawinsky gehört vor allem zur Musik welcher Zeit?",
      image: "stravinsky.jpg",
      options: ["Barock", "Wiener Klassik", "20. Jahrhundert / Moderne", "Renaissance"],
      correct: 2
    },
    {
      question: "Joseph Haydn gilt als wichtiger Vertreter welcher Epoche?",
      image: "jhaydn.jpg",
      options: ["Wiener Klassik", "Impressionismus", "Spätromantik", "Renaissance"],
      correct: 0
    },
    {
      question: "John Cage wird besonders mit welcher Richtung verbunden?",
      image: "cage.jpg",
      options: ["Kirchenmusik der Renaissance", "Experimentelle Musik / Avantgarde", "Frühbarocke Oper", "Wiener Klassik"],
      correct: 1
    }
  ]
},
       {
        id: 4,
        title: "Oper & Musiktheater",
        description: "Von Mozart bis Puccini: Bühne frei.",
        active: false,
        questions: []
      },
      {
        id: 5,
        title: "Romantik & Nationalstile",
        description: "Chopin, Dvořák, Grieg, Sibelius und mehr.",
        active: false,
        questions: []
      },
      {
        id: 6,
        title: "Barock & Alte Musik",
        description: "Monteverdi, Palestrina, Schütz, Lully, Corelli.",
        active: false,
        questions: []
      },
      {
        id: 7,
        title: "Moderne & 20. Jahrhundert",
        description: "Debussy, Ravel, Strawinsky, Schönberg, Cage.",
        active: false,
        questions: []
      },
      {
        id: 8,
        title: "Kirchenmusik & Chor",
        description: "Messe, Motette, Passion, Oratorium.",
        active: false,
        questions: []
      },
      {
        id: 9,
        title: "Formen, Gattungen, Begriffe",
        description: "Für angehende Musikstudierende und Neugierige.",
        active: false,
        questions: []
      },
      {
        id: 10,
        title: "Boss-Level",
        description: "Fies, aber fair. Für echte Musikgeschichte-Nerds.",
        active: false,
        questions: []
      }
    ];

    let currentLevelIndex = 0;
    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    function renderLevelScreen() {
      const grid = document.getElementById("levelGrid");
      grid.innerHTML = "";

      levels.forEach((level, index) => {
        const card = document.createElement("div");
        card.className = "level-card" + (level.active ? "" : " locked");

        const best = localStorage.getItem("bestScoreLevel" + level.id);
        const bestText = best ? `<div class="best-score">Beste Punktzahl: ${best}/10</div>` : "";

        card.innerHTML = `
          <div>
            <span class="badge">Level ${level.id}</span>
            <h3>${level.title}</h3>
            <p>${level.description}</p>
          </div>
          <div>
            ${level.active ? bestText || '<div class="best-score">Noch nicht gespielt</div>' : '<div class="best-score">Kommt bald</div>'}
          </div>
        `;

        if (level.active) {
          card.onclick = () => startLevel(index);
        }

        grid.appendChild(card);
      });
    }

    function startLevel(index) {
      currentLevelIndex = index;
      currentQuestion = 0;
      score = 0;
      answered = false;

      const level = levels[currentLevelIndex];

      document.getElementById("levelScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("quizScreen").classList.remove("hidden");

      document.getElementById("levelBadge").textContent = "Level " + level.id;
      document.getElementById("levelTitle").textContent = level.title;
      document.getElementById("totalQuestions").textContent = level.questions.length;

      showQuestion();
    }

    function showQuestion() {
      const level = levels[currentLevelIndex];
      const q = level.questions[currentQuestion];

      answered = false;

      document.getElementById("questionText").textContent = q.question;
      document.getElementById("currentQuestion").textContent = currentQuestion + 1;
      document.getElementById("feedback").textContent = "";

      const imageError = document.getElementById("imageError");
      imageError.classList.add("hidden");
      imageError.textContent = "";

      const img = document.getElementById("composerImage");
      img.src = q.image;
      img.alt = "Bild: " + q.image;

      img.onerror = function() {
        imageError.textContent = "Bild nicht gefunden: " + q.image;
        imageError.classList.remove("hidden");
      };

      img.onload = function() {
        imageError.classList.add("hidden");
      };

      const progress = ((currentQuestion + 1) / level.questions.length) * 100;
      document.getElementById("progress").style.width = progress + "%";

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = () => selectAnswer(index, btn);
        optionsDiv.appendChild(btn);
      });

      document.getElementById("nextBtn").classList.add("hidden");
    }

    function selectAnswer(index, button) {
      if (answered) return;

      answered = true;

      const level = levels[currentLevelIndex];
      const correctIndex = level.questions[currentQuestion].correct;
      const buttons = document.querySelectorAll(".options button");
      const feedback = document.getElementById("feedback");

      buttons.forEach(btn => {
        btn.disabled = true;
      });

      if (index === correctIndex) {
        button.classList.add("correct");
        score++;
        feedback.textContent = "Richtig! Sehr schön. 🎉";
      } else {
        button.classList.add("wrong");
        buttons[correctIndex].classList.add("correct");
        feedback.textContent = "Fast — die grüne Antwort wäre richtig gewesen.";
      }

      document.getElementById("nextBtn").classList.remove("hidden");
    }

    function nextQuestion() {
      const level = levels[currentLevelIndex];

      currentQuestion++;

      if (currentQuestion < level.questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      const level = levels[currentLevelIndex];

      document.getElementById("quizScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");

      document.getElementById("resultLevelBadge").textContent = "Level " + level.id + " abgeschlossen";
      document.getElementById("resultTitle").textContent = level.title;

      const percentage = Math.round((score / level.questions.length) * 100);

      document.getElementById("scoreText").textContent = score + "/" + level.questions.length;

      const storageKey = "bestScoreLevel" + level.id;
      const oldBest = Number(localStorage.getItem(storageKey) || 0);

      if (score > oldBest) {
        localStorage.setItem(storageKey, score);
      }

      let comment = "";

      if (percentage === 100) {
        comment = "Perfekt! Maestro-Modus aktiviert. 🏆";
      } else if (percentage >= 80) {
        comment = "Stark! Das ist schon richtig sattelfestes Wissen.";
      } else if (percentage >= 60) {
        comment = "Sehr ordentlich. Da ist musikalisch schon einiges vorhanden.";
      } else if (percentage >= 40) {
        comment = "Solider Anfang. Noch einmal spielen lohnt sich.";
      } else {
        comment = "Da wartet noch ein kleines Musikgeschichte-Abenteuer auf dich.";
      }

      if (score > oldBest) {
        comment += " Neue persönliche Bestleistung!";
      }

      document.getElementById("comment").textContent =
        comment + " Du hast " + percentage + "% erreicht.";
    }

    function restartCurrentLevel() {
      startLevel(currentLevelIndex);
    }

    function backToLevels() {
      document.getElementById("quizScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("levelScreen").classList.remove("hidden");
      renderLevelScreen();
    }

    renderLevelScreen();
  </script>
</body>
</html>
